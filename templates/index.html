<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>主界面 - 训练伤康复助手</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { primary: '#1E40AF', success: '#10B981', warning: '#F59E0B', danger: '#EF4444' },
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
        },
      }
    }
  </script>
  <style>
    body { font-family: 'Inter', 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif; }
    .nav-shadow { box-shadow: 0 1px 3px 0 rgba(0,0,0,0.1), 0 1px 2px 0 rgba(0,0,0,0.06); }
    .card-shadow { box-shadow: 0 4px 6px -1px rgba(0,0,0,0.07), 0 2px 4px -1px rgba(0,0,0,0.04); }

    /* Avatar picker modal */
    #avatar-modal { display: none; }
    #avatar-modal.open { display: flex; }

    /* Calendar */
    .cal-day { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; cursor: default; position: relative; margin: 0 auto; }
    .cal-day.has-training { background-color: #FEF3C7; color: #92400E; font-weight: 600; }
    .cal-day.trained { background-color: #D1FAE5; color: #065F46; font-weight: 600; }
    .cal-day.today-done { background-color: #10B981; color: white; font-weight: 700; }
    .cal-day.today-undone { background-color: #FEF3C7; color: #92400E; font-weight: 700; border: 2px solid #F59E0B; }
    .cal-day.today-rest { background-color: #EFF6FF; color: #1E40AF; font-weight: 700; border: 2px dashed #93C5FD; }
    .cal-dot { width: 5px; height: 5px; border-radius: 50%; background: #EF4444; position: absolute; bottom: 1px; left: 50%; transform: translateX(-50%); }
    .cal-checkmark { font-size: 0.65rem; }

    /* Stage badge */
    .stage-badge { display: inline-block; padding: 2px 8px; border-radius: 9999px; font-size: 0.72rem; font-weight: 600; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- ═══ 顶栏 ═══ -->
  <header class="h-14 bg-white border-b border-gray-200 nav-shadow flex items-center px-4 gap-3 sticky top-0 z-30">
    <div class="flex items-center gap-2 flex-shrink-0">
      <div class="w-8 h-8 bg-primary rounded-lg flex items-center justify-center text-white text-sm font-bold">医</div>
      <span class="text-gray-800 font-bold text-base whitespace-nowrap hidden sm:inline">训练伤康复助手</span>
    </div>
    <div class="flex-1"></div>
    <nav class="flex items-center gap-1 flex-shrink-0">
      <a href="/" class="px-3 py-1.5 rounded-lg text-sm font-semibold text-primary bg-blue-50 transition-colors whitespace-nowrap">主界面</a>
      <a href="/profile" class="px-3 py-1.5 rounded-lg text-sm font-medium text-gray-600 hover:text-primary hover:bg-blue-50 transition-colors whitespace-nowrap">个人档案</a>
      <a href="/plan" class="px-3 py-1.5 rounded-lg text-sm font-medium text-gray-600 hover:text-primary hover:bg-blue-50 transition-colors whitespace-nowrap">训练计划</a>
      <a href="/knowledge" class="px-3 py-1.5 rounded-lg text-sm font-medium text-gray-600 hover:text-primary hover:bg-blue-50 transition-colors whitespace-nowrap">知识库</a>
      <a href="/companion" class="px-3 py-1.5 rounded-lg text-sm font-medium text-gray-600 hover:text-primary hover:bg-blue-50 transition-colors whitespace-nowrap">智能学伴</a>
    </nav>
  </header>

  <!-- ═══ 主体：三栏布局 ═══ -->
  <main class="max-w-6xl mx-auto px-4 py-6 grid grid-cols-1 lg:grid-cols-[220px_1fr_260px] gap-5">

    <!-- ─── 左栏：人物形象 ─── -->
    <div class="flex flex-col gap-4">
      <!-- 头像展示 -->
      <div class="bg-white rounded-2xl card-shadow p-5 flex flex-col items-center gap-4">
        <div class="relative">
          <div id="avatar-display"
            class="w-28 h-28 rounded-full flex items-center justify-center text-5xl bg-blue-50 border-4 border-blue-200 overflow-hidden select-none"
            style="font-size: 3.5rem;">
            🧑‍⚕️
          </div>
          <button onclick="openAvatarModal()"
            class="absolute bottom-1 right-1 w-7 h-7 bg-primary text-white rounded-full text-xs flex items-center justify-center shadow-md hover:bg-blue-800 transition-colors"
            title="更换头像">
            ✏️
          </button>
        </div>
        <div class="text-center">
          <p id="avatar-name" class="text-gray-800 font-bold text-base">-</p>
          <p id="avatar-stage" class="text-xs text-gray-500 mt-0.5">-</p>
        </div>
        <button onclick="openAvatarModal()"
          class="w-full text-xs text-gray-500 hover:text-primary hover:bg-blue-50 py-2 px-3 rounded-lg border border-gray-200 hover:border-blue-300 transition-colors">
          更换形象
        </button>
      </div>

      <!-- 快捷入口 -->
      <div class="bg-white rounded-2xl card-shadow p-4 space-y-2">
        <p class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-3">快捷入口</p>
        <a href="/checkin"
          class="flex items-center gap-3 px-3 py-2.5 bg-green-50 hover:bg-green-100 border border-green-200 rounded-xl transition-colors cursor-pointer group">
          <span class="text-lg">✅</span>
          <div>
            <p class="text-sm font-semibold text-gray-800 group-hover:text-success transition-colors">训练打卡</p>
            <p class="text-xs text-gray-400">记录今日训练</p>
          </div>
        </a>
        <a href="/profile"
          class="flex items-center gap-3 px-3 py-2.5 bg-blue-50 hover:bg-blue-100 border border-blue-200 rounded-xl transition-colors cursor-pointer group">
          <span class="text-lg">📋</span>
          <div>
            <p class="text-sm font-semibold text-gray-800 group-hover:text-primary transition-colors">个人档案</p>
            <p class="text-xs text-gray-400">查看与更新信息</p>
          </div>
        </a>
      </div>
    </div>

    <!-- ─── 中栏：信息卡片 ─── -->
    <div class="flex flex-col gap-4">

      <!-- 欢迎卡 -->
      <div class="bg-gradient-to-r from-primary to-blue-500 rounded-2xl p-5 text-white card-shadow">
        <div class="flex items-start justify-between">
          <div>
            <p class="text-blue-100 text-sm mb-1">欢迎回来</p>
            <h2 id="info-name" class="text-2xl font-bold">-</h2>
            <div class="mt-2 flex items-center gap-2">
              <span id="info-stage-badge" class="stage-badge bg-white bg-opacity-20 text-white">-</span>
              <span id="info-injury-short" class="text-blue-100 text-sm">-</span>
            </div>
          </div>
          <div class="text-4xl opacity-80">🏃</div>
        </div>
      </div>

      <!-- 当前状态 -->
      <div class="bg-white rounded-2xl card-shadow p-5">
        <h3 class="text-sm font-bold text-gray-700 mb-3 flex items-center gap-2">
          <span class="w-1 h-4 bg-primary rounded-full inline-block"></span>当前状态
        </h3>
        <div class="grid grid-cols-2 sm:grid-cols-3 gap-3">
          <div class="bg-gray-50 rounded-xl p-3 text-center">
            <p class="text-xs text-gray-400 mb-1">康复阶段</p>
            <p id="stat-stage" class="text-sm font-bold text-gray-800">-</p>
          </div>
          <div class="bg-gray-50 rounded-xl p-3 text-center">
            <p class="text-xs text-gray-400 mb-1">疼痛等级</p>
            <p id="stat-pain" class="text-sm font-bold text-gray-800">-</p>
          </div>
          <div class="bg-gray-50 rounded-xl p-3 text-center col-span-2 sm:col-span-1">
            <p class="text-xs text-gray-400 mb-1">今日打卡</p>
            <p id="stat-checkin" class="text-sm font-bold text-gray-800">-</p>
          </div>
        </div>
      </div>

      <!-- 康复训练目标 -->
      <div class="bg-white rounded-2xl card-shadow p-5">
        <h3 class="text-sm font-bold text-gray-700 mb-3 flex items-center gap-2">
          <span class="w-1 h-4 bg-success rounded-full inline-block"></span>康复训练目标
        </h3>
        <div id="goal-content">
          <p class="text-gray-400 text-sm">暂无训练目标，请先完善个人档案并获取康复方案</p>
        </div>
      </div>

      <!-- 今日训练任务 -->
      <div class="bg-white rounded-2xl card-shadow p-5">
        <div class="flex items-center justify-between mb-3">
          <h3 class="text-sm font-bold text-gray-700 flex items-center gap-2">
            <span class="w-1 h-4 bg-warning rounded-full inline-block"></span>今日训练任务
          </h3>
          <a href="/checkin" class="text-xs text-primary hover:underline">去打卡 →</a>
        </div>
        <div id="tasks-content">
          <p class="text-gray-400 text-sm">暂无训练任务</p>
        </div>
      </div>

    </div>

    <!-- ─── 右栏：训练日历 ─── -->
    <div class="flex flex-col gap-4">
      <div class="bg-white rounded-2xl card-shadow p-5">

        <!-- 月份标题 -->
        <div class="flex items-center justify-between mb-4">
          <button onclick="prevMonth()" class="w-7 h-7 flex items-center justify-center text-gray-400 hover:text-primary hover:bg-blue-50 rounded-lg transition-colors text-sm">‹</button>
          <h3 id="cal-title" class="text-sm font-bold text-gray-800">-</h3>
          <button onclick="nextMonth()" class="w-7 h-7 flex items-center justify-center text-gray-400 hover:text-primary hover:bg-blue-50 rounded-lg transition-colors text-sm">›</button>
        </div>

        <!-- 星期行 -->
        <div class="grid grid-cols-7 mb-2">
          <div class="text-center text-xs text-gray-400 font-medium py-1">日</div>
          <div class="text-center text-xs text-gray-400 font-medium py-1">一</div>
          <div class="text-center text-xs text-gray-400 font-medium py-1">二</div>
          <div class="text-center text-xs text-gray-400 font-medium py-1">三</div>
          <div class="text-center text-xs text-gray-400 font-medium py-1">四</div>
          <div class="text-center text-xs text-gray-400 font-medium py-1">五</div>
          <div class="text-center text-xs text-gray-400 font-medium py-1">六</div>
        </div>

        <!-- 日期格 -->
        <div id="cal-grid" class="grid grid-cols-7 gap-y-1.5"></div>

        <!-- 图例 -->
        <div class="mt-4 pt-3 border-t border-gray-100 grid grid-cols-2 gap-x-2 gap-y-1.5">
          <div class="flex items-center gap-1.5">
            <div class="w-3 h-3 rounded-full bg-yellow-100 border border-yellow-400 flex-shrink-0"></div>
            <span class="text-xs text-gray-400">有训练计划</span>
          </div>
          <div class="flex items-center gap-1.5">
            <div class="w-3 h-3 rounded-full bg-green-100 border border-green-400 flex-shrink-0"></div>
            <span class="text-xs text-gray-400">已完成训练</span>
          </div>
          <div class="flex items-center gap-1.5">
            <div class="w-3 h-3 rounded-full bg-green-500 flex-shrink-0"></div>
            <span class="text-xs text-gray-400">今日已打卡</span>
          </div>
          <div class="flex items-center gap-1.5">
            <div class="w-2 h-2 rounded-full bg-red-500 flex-shrink-0"></div>
            <span class="text-xs text-gray-400">待打卡</span>
          </div>
        </div>

      </div>

      <!-- 本月统计 -->
      <div class="bg-white rounded-2xl card-shadow p-4">
        <p class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-3">本月统计</p>
        <div class="grid grid-cols-2 gap-3">
          <div class="text-center">
            <p id="stat-planned" class="text-2xl font-bold text-primary">-</p>
            <p class="text-xs text-gray-400 mt-0.5">计划天数</p>
          </div>
          <div class="text-center">
            <p id="stat-done" class="text-2xl font-bold text-success">-</p>
            <p class="text-xs text-gray-400 mt-0.5">完成天数</p>
          </div>
        </div>
        <div class="mt-3">
          <div class="flex justify-between text-xs text-gray-400 mb-1">
            <span>完成率</span>
            <span id="stat-rate">-</span>
          </div>
          <div class="h-2 bg-gray-100 rounded-full overflow-hidden">
            <div id="stat-bar" class="h-full bg-success rounded-full transition-all" style="width: 0%"></div>
          </div>
        </div>
      </div>
    </div>

  </main>

  <!-- ═══ 头像选择弹窗 ═══ -->
  <div id="avatar-modal"
    class="fixed inset-0 bg-black bg-opacity-40 z-50 items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-6">
      <div class="flex items-center justify-between mb-4">
        <h3 class="text-base font-bold text-gray-800">选择形象</h3>
        <button onclick="closeAvatarModal()" class="text-gray-400 hover:text-gray-600 w-7 h-7 flex items-center justify-center rounded-lg hover:bg-gray-100 transition-colors">✕</button>
      </div>

      <!-- 预设头像 -->
      <p class="text-xs text-gray-500 mb-2">系统预设</p>
      <div class="grid grid-cols-5 gap-2 mb-4">
        <button onclick="selectPreset('🧑‍⚕️')" class="preset-avatar w-12 h-12 rounded-xl bg-blue-50 hover:bg-blue-100 text-2xl flex items-center justify-center transition-colors border-2 border-transparent hover:border-blue-300" data-emoji="🧑‍⚕️">🧑‍⚕️</button>
        <button onclick="selectPreset('🏃')" class="preset-avatar w-12 h-12 rounded-xl bg-green-50 hover:bg-green-100 text-2xl flex items-center justify-center transition-colors border-2 border-transparent hover:border-green-300" data-emoji="🏃">🏃</button>
        <button onclick="selectPreset('🧘')" class="preset-avatar w-12 h-12 rounded-xl bg-purple-50 hover:bg-purple-100 text-2xl flex items-center justify-center transition-colors border-2 border-transparent hover:border-purple-300" data-emoji="🧘">🧘</button>
        <button onclick="selectPreset('💪')" class="preset-avatar w-12 h-12 rounded-xl bg-orange-50 hover:bg-orange-100 text-2xl flex items-center justify-center transition-colors border-2 border-transparent hover:border-orange-300" data-emoji="💪">💪</button>
        <button onclick="selectPreset('🌟')" class="preset-avatar w-12 h-12 rounded-xl bg-yellow-50 hover:bg-yellow-100 text-2xl flex items-center justify-center transition-colors border-2 border-transparent hover:border-yellow-300" data-emoji="🌟">🌟</button>
        <button onclick="selectPreset('🦁')" class="preset-avatar w-12 h-12 rounded-xl bg-amber-50 hover:bg-amber-100 text-2xl flex items-center justify-center transition-colors border-2 border-transparent hover:border-amber-300" data-emoji="🦁">🦁</button>
        <button onclick="selectPreset('🐯')" class="preset-avatar w-12 h-12 rounded-xl bg-orange-50 hover:bg-orange-100 text-2xl flex items-center justify-center transition-colors border-2 border-transparent hover:border-orange-300" data-emoji="🐯">🐯</button>
        <button onclick="selectPreset('🦅')" class="preset-avatar w-12 h-12 rounded-xl bg-sky-50 hover:bg-sky-100 text-2xl flex items-center justify-center transition-colors border-2 border-transparent hover:border-sky-300" data-emoji="🦅">🦅</button>
        <button onclick="selectPreset('⚡')" class="preset-avatar w-12 h-12 rounded-xl bg-yellow-50 hover:bg-yellow-100 text-2xl flex items-center justify-center transition-colors border-2 border-transparent hover:border-yellow-300" data-emoji="⚡">⚡</button>
        <button onclick="selectPreset('🏅')" class="preset-avatar w-12 h-12 rounded-xl bg-red-50 hover:bg-red-100 text-2xl flex items-center justify-center transition-colors border-2 border-transparent hover:border-red-300" data-emoji="🏅">🏅</button>
      </div>

      <!-- 自定义上传 -->
      <p class="text-xs text-gray-500 mb-2">自定义上传</p>
      <label class="flex items-center justify-center gap-2 w-full py-3 border-2 border-dashed border-gray-200 rounded-xl cursor-pointer hover:border-primary hover:bg-blue-50 transition-colors text-sm text-gray-500 hover:text-primary">
        <span>📷</span> 点击上传头像图片
        <input type="file" accept="image/*" class="hidden" onchange="handleAvatarUpload(event)">
      </label>
      <p class="text-xs text-gray-400 mt-1 text-center">支持 JPG、PNG，建议正方形图片</p>
    </div>
  </div>

  <script>
    // ─── 状态 ─────────────────────────────────────────────────────────────────
    let calYear, calMonth; // 当前显示的年月
    let todayCheckinDates = new Set(); // 已打卡日期 "YYYY-MM-DD"
    let planActiveDays = new Set();    // 有训练计划的日期 "YYYY-MM-DD"
    let todayStr = '';

    // ─── 初始化 ───────────────────────────────────────────────────────────────
    window.addEventListener('DOMContentLoaded', async () => {
      const now = new Date();
      calYear = now.getFullYear();
      calMonth = now.getMonth(); // 0-indexed
      todayStr = formatDate(now);

      loadAvatar();
      await Promise.all([loadPatientInfo(), loadCheckins()]);
      renderCalendar();
    });

    // ─── 患者信息 ─────────────────────────────────────────────────────────────
    async function loadPatientInfo() {
      try {
        const resp = await fetch('/api/me');
        if (!resp.ok) return;
        const data = await resp.json();
        if (!data || !data.name) return;

        document.getElementById('avatar-name').textContent = data.name;
        document.getElementById('info-name').textContent = data.name;

        const stage = data.recovery_stage || '-';
        document.getElementById('avatar-stage').textContent = stage;
        document.getElementById('info-stage-badge').textContent = stage;
        document.getElementById('stat-stage').textContent = stage;

        if (data.injury_description) {
          const short = data.injury_description.slice(0, 12) + (data.injury_description.length > 12 ? '...' : '');
          document.getElementById('info-injury-short').textContent = short;
        }

        const pain = data.pain_level;
        if (pain != null) {
          const painColor = pain <= 3 ? 'text-success' : pain <= 6 ? 'text-warning' : 'text-danger';
          document.getElementById('stat-pain').innerHTML = `<span class="${painColor}">${pain}/10</span>`;
        }

        // 加载康复方案
        await loadCurrentPlan(data);
      } catch (e) {
        console.error('加载患者信息失败', e);
      }
    }

    async function loadCurrentPlan(patientData) {
      try {
        const resp = await fetch('/api/plan/current');
        if (!resp.ok) return;
        const record = await resp.json();
        if (!record) return;

        const p = record.plan || {};

        // 兼容两种方案格式：
        // 1. 规则方案：直接含 `目标` / `动作` 键
        // 2. AI四阶段方案：含 `phases[]`，从当前阶段（is_current=true）提取
        let goal = '', principle = '', actions = [];

        if (Array.isArray(p.phases) && p.phases.length > 0) {
          // AI 四阶段方案：找当前阶段
          const cur = p.phases.find(ph => ph.is_current) || p.phases[0];
          goal      = cur.goal      || '';
          principle = cur.rationale || '';
          // exercises 格式：{name, freq, focus}
          actions   = (cur.exercises || []).map(e => ({
            '名称': e.name  || '',
            '次数': e.freq  || '',
            '说明': e.focus || '',
          }));
        } else {
          // 规则方案：中文键
          goal      = p['目标'] || '';
          principle = p['原则'] || '';
          actions   = p['动作'] || [];
        }

        if (!goal && actions.length === 0) return;

        // 康复目标
        if (goal) {
          document.getElementById('goal-content').innerHTML = `
            <div class="space-y-2">
              <div class="flex items-start gap-2">
                <span class="text-success mt-0.5">▶</span>
                <p class="text-gray-700 text-sm leading-relaxed">${escapeHtml(goal)}</p>
              </div>
              ${principle ? `<p class="text-xs text-gray-400 pl-5">${escapeHtml(principle)}</p>` : ''}
            </div>`;
        }

        // 今日训练任务
        if (actions.length > 0) {
          document.getElementById('tasks-content').innerHTML = actions.map((a, i) => `
            <div class="flex items-start gap-3 py-2.5 ${i < actions.length - 1 ? 'border-b border-gray-100' : ''}">
              <div class="w-6 h-6 rounded-full bg-blue-50 border border-blue-200 flex items-center justify-center text-xs text-primary font-bold flex-shrink-0 mt-0.5">${i + 1}</div>
              <div class="flex-1 min-w-0">
                <p class="text-sm font-semibold text-gray-800">${escapeHtml(a['名称'] || '')}</p>
                <p class="text-xs text-gray-400 mt-0.5">${escapeHtml(a['次数'] || '')}</p>
              </div>
            </div>`).join('');
        } else {
          document.getElementById('tasks-content').innerHTML = '<p class="text-gray-400 text-sm">今日暂无训练任务</p>';
        }

        buildPlanDays(record);
      } catch (e) {
        console.error('加载训练计划失败', e);
      }
    }

    function buildPlanDays(plan) {
      // 根据康复方案，生成有训练的日期集合
      // 策略：从方案创建日起，到 created_at + duration 天，排除周日（简单演示）
      // 如果后端有 plan_dates 字段直接用
      if (plan.plan_dates && Array.isArray(plan.plan_dates)) {
        plan.plan_dates.forEach(d => planActiveDays.add(d));
        return;
      }
      // fallback: 从今天起标7天有训练（排除周日示意）
      const start = new Date(plan.created_at || Date.now());
      start.setHours(0, 0, 0, 0);
      for (let i = 0; i < 30; i++) {
        const d = new Date(start);
        d.setDate(d.getDate() + i);
        if (d.getDay() !== 0) { // 排除周日
          planActiveDays.add(formatDate(d));
        }
      }
      renderCalendar();
    }

    // ─── 打卡记录 ─────────────────────────────────────────────────────────────
    async function loadCheckins() {
      try {
        const resp = await fetch('/api/checkins');
        if (!resp.ok) return;
        const data = await resp.json();
        const checkins = data.checkins || data || [];
        checkins.forEach(c => {
          const dateStr = (c.checkin_date || c.created_at || '').slice(0, 10);
          if (dateStr) todayCheckinDates.add(dateStr);
        });

        // 今日打卡状态
        const todayDone = todayCheckinDates.has(todayStr);
        document.getElementById('stat-checkin').textContent = todayDone ? '已完成' : '未打卡';
        document.getElementById('stat-checkin').className = 'text-sm font-bold ' + (todayDone ? 'text-success' : 'text-warning');
      } catch (e) {
        document.getElementById('stat-checkin').textContent = '未打卡';
      }
    }

    // ─── 日历渲染 ─────────────────────────────────────────────────────────────
    function renderCalendar() {
      const year = calYear;
      const month = calMonth; // 0-indexed
      const monthNames = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
      document.getElementById('cal-title').textContent = `${year}年 ${monthNames[month]}`;

      const grid = document.getElementById('cal-grid');
      grid.innerHTML = '';

      const firstDay = new Date(year, month, 1).getDay(); // 0=Sun
      const daysInMonth = new Date(year, month + 1, 0).getDate();

      // 空白格
      for (let i = 0; i < firstDay; i++) {
        const blank = document.createElement('div');
        blank.className = 'h-9';
        grid.appendChild(blank);
      }

      // 统计本月
      let plannedCount = 0;
      let doneCount = 0;

      for (let d = 1; d <= daysInMonth; d++) {
        const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
        const isToday = dateStr === todayStr;
        const hasPlan = planActiveDays.has(dateStr);
        const isDone = todayCheckinDates.has(dateStr);
        const isPast = dateStr < todayStr;

        if (hasPlan) plannedCount++;
        if (isDone) doneCount++;

        const cell = document.createElement('div');
        cell.className = 'text-center';

        let dayClass = 'cal-day';
        let content = String(d);
        let dotHtml = '';

        if (isToday) {
          if (isDone) {
            dayClass += ' today-done';
            content = '<span class="cal-checkmark">✓</span>';
          } else if (hasPlan) {
            dayClass += ' today-undone';
            dotHtml = '<div class="cal-dot"></div>';
          } else {
            dayClass += ' today-rest';
          }
        } else if (isDone) {
          dayClass += ' trained';
          content = '<span class="cal-checkmark">✓</span>';
        } else if (hasPlan && isPast) {
          // 过去有计划但未打卡
          dayClass += ' has-training';
          dotHtml = '<div class="cal-dot"></div>';
        } else if (hasPlan) {
          // 未来有计划
          dayClass += ' has-training';
          dotHtml = '<div class="cal-dot"></div>';
        }

        cell.innerHTML = `<div class="${dayClass}">${content}${dotHtml}</div>`;
        grid.appendChild(cell);
      }

      // 本月统计
      document.getElementById('stat-planned').textContent = plannedCount;
      document.getElementById('stat-done').textContent = doneCount;
      const rate = plannedCount > 0 ? Math.round(doneCount / plannedCount * 100) : 0;
      document.getElementById('stat-rate').textContent = rate + '%';
      document.getElementById('stat-bar').style.width = rate + '%';
    }

    function prevMonth() {
      calMonth--;
      if (calMonth < 0) { calMonth = 11; calYear--; }
      renderCalendar();
    }

    function nextMonth() {
      calMonth++;
      if (calMonth > 11) { calMonth = 0; calYear++; }
      renderCalendar();
    }

    // ─── 头像 ─────────────────────────────────────────────────────────────────
    function loadAvatar() {
      const saved = localStorage.getItem('rehab_avatar');
      if (saved) applyAvatar(saved);
    }

    function applyAvatar(value) {
      const el = document.getElementById('avatar-display');
      if (value.startsWith('data:')) {
        el.innerHTML = `<img src="${value}" class="w-full h-full object-cover rounded-full">`;
      } else {
        el.textContent = value;
      }
    }

    function selectPreset(emoji) {
      localStorage.setItem('rehab_avatar', emoji);
      applyAvatar(emoji);
      closeAvatarModal();
    }

    function handleAvatarUpload(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        const data = ev.target.result;
        localStorage.setItem('rehab_avatar', data);
        applyAvatar(data);
        closeAvatarModal();
      };
      reader.readAsDataURL(file);
    }

    function openAvatarModal() {
      document.getElementById('avatar-modal').classList.add('open');
    }

    function closeAvatarModal() {
      document.getElementById('avatar-modal').classList.remove('open');
    }

    // 点击弹窗背景关闭
    document.getElementById('avatar-modal').addEventListener('click', function(e) {
      if (e.target === this) closeAvatarModal();
    });

    // ─── 工具函数 ─────────────────────────────────────────────────────────────
    function formatDate(d) {
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    }

    function escapeHtml(str) {
      return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
  </script>
</body>
</html>
