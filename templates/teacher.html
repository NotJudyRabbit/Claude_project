<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>教师端 - 班级学员情况</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#1E40AF',
            secondary: '#3B82F6',
            success: '#10B981',
            warning: '#F59E0B',
            danger: '#EF4444',
          },
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
        },
      }
    }
  </script>
  <style>
    body { font-family: 'Inter', 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif; }
    .card-shadow { box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06); }
    .nav-shadow { box-shadow: 0 1px 3px 0 rgba(0,0,0,0.1), 0 1px 2px 0 rgba(0,0,0,0.06); }
    .stage-badge {
      display: inline-block; padding: 2px 10px;
      border-radius: 9999px; font-size: 0.7rem; font-weight: 600;
    }
    table { border-collapse: collapse; width: 100%; }
    th { background: #f8fafc; font-size: 0.75rem; font-weight: 600; color: #64748b;
         text-align: left; padding: 10px 14px; border-bottom: 1px solid #e2e8f0; }
    td { font-size: 0.82rem; color: #374151; padding: 11px 14px;
         border-bottom: 1px solid #f1f5f9; vertical-align: middle; }
    tr:hover td { background: #f8fafc; }
    input, select, textarea {
      border: 1px solid #e5e7eb; border-radius: 0.5rem;
      padding: 0.4rem 0.75rem; font-size: 0.82rem; color: #374151; outline: none;
    }
    input:focus, select:focus, textarea:focus { border-color: #1E40AF; }
    #detail-modal { display: none; }
    #detail-modal.open { display: flex; }
    #review-modal { display: none; }
    #review-modal.open { display: flex; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- 顶栏 -->
  <header class="h-14 bg-white border-b border-gray-200 nav-shadow flex items-center px-6 gap-3 sticky top-0 z-30">
    <div class="flex items-center gap-2">
      <div class="w-8 h-8 bg-primary rounded-lg flex items-center justify-center text-white text-sm font-bold">医</div>
      <span class="text-gray-800 font-bold text-base">训练伤康复助手</span>
    </div>
    <span class="text-gray-300 mx-2">|</span>
    <span class="text-gray-700 font-semibold text-sm">教师端 · 班级学员情况</span>
    <div class="flex-1"></div>
    <a href="/" class="text-sm text-gray-500 hover:text-primary border border-gray-200 px-3 py-1.5 rounded-lg transition-colors">
      返回用户端
    </a>
  </header>

  <main class="max-w-7xl mx-auto px-4 py-6">

    <!-- 统计卡片 -->
    <div class="grid grid-cols-2 sm:grid-cols-5 gap-4 mb-6">
      <div class="bg-white rounded-xl card-shadow p-5">
        <p class="text-xs text-gray-500 mb-1">学员总数</p>
        <p id="stat-total" class="text-3xl font-bold text-primary">—</p>
      </div>
      <div class="bg-white rounded-xl card-shadow p-5">
        <p class="text-xs text-gray-500 mb-1">高风险学员</p>
        <p id="stat-risk" class="text-3xl font-bold text-danger">—</p>
      </div>
      <div class="bg-white rounded-xl card-shadow p-5">
        <p class="text-xs text-gray-500 mb-1">今日打卡</p>
        <p id="stat-checkins" class="text-3xl font-bold text-success">—</p>
      </div>
      <div class="bg-white rounded-xl card-shadow p-5">
        <p class="text-xs text-gray-500 mb-1">待复核</p>
        <p id="stat-reviews" class="text-3xl font-bold text-warning">—</p>
      </div>
      <div class="bg-white rounded-xl card-shadow p-5 sm:col-span-1 col-span-2">
        <p class="text-xs text-gray-500 mb-1">康复阶段分布</p>
        <div id="stat-stages" class="flex flex-wrap gap-1 mt-1"></div>
      </div>
    </div>

    <!-- 筛选栏 -->
    <div class="bg-white rounded-xl card-shadow p-4 mb-4 flex flex-wrap items-center gap-3">
      <input id="search-input" type="text" placeholder="搜索姓名/伤情/单位..."
        class="flex-1 min-w-36" oninput="debounceLoad()">
      <select id="stage-filter" onchange="loadStudents(1)">
        <option value="">全部阶段</option>
        <option value="急性期">急性期</option>
        <option value="亚急性期">亚急性期</option>
        <option value="恢复期">恢复期</option>
        <option value="强化期">强化期</option>
        <option value="未知">未知</option>
      </select>
      <button onclick="loadStudents(1)"
        class="bg-primary text-white px-4 py-1.5 rounded-lg text-sm font-medium hover:bg-blue-800 transition-colors">
        刷新
      </button>
    </div>

    <!-- 学员表格 -->
    <div class="bg-white rounded-xl card-shadow overflow-hidden">
      <table>
        <thead>
          <tr>
            <th>姓名</th>
            <th>性别/年龄</th>
            <th>康复阶段</th>
            <th>疼痛</th>
            <th>伤情概要</th>
            <th>单位/班级</th>
            <th>最近打卡</th>
            <th>最近风险</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="student-tbody">
          <tr><td colspan="9" class="text-center text-gray-400 py-8">加载中...</td></tr>
        </tbody>
      </table>

      <div class="flex items-center justify-between px-4 py-3 border-t border-gray-100">
        <span id="page-info" class="text-xs text-gray-400">共 0 条</span>
        <div class="flex items-center gap-2">
          <button id="btn-prev" onclick="changePage(-1)"
            class="px-3 py-1 text-xs border border-gray-200 rounded-lg text-gray-600 hover:bg-gray-50 disabled:opacity-40 disabled:cursor-not-allowed transition-colors">
            上一页
          </button>
          <span id="page-num" class="text-xs text-gray-500">第 1 页</span>
          <button id="btn-next" onclick="changePage(1)"
            class="px-3 py-1 text-xs border border-gray-200 rounded-lg text-gray-600 hover:bg-gray-50 disabled:opacity-40 disabled:cursor-not-allowed transition-colors">
            下一页
          </button>
        </div>
      </div>
    </div>

  </main>

  <!-- ═══ 学员详情弹窗 ═══ -->
  <div id="detail-modal"
    class="fixed inset-0 bg-black bg-opacity-40 z-50 items-center justify-center p-4">
    <div class="bg-white rounded-xl shadow-2xl w-full max-w-2xl max-h-[90vh] flex flex-col">
      <div class="flex items-center justify-between px-5 py-4 border-b border-gray-100 flex-shrink-0">
        <h3 id="detail-title" class="font-bold text-gray-800">学员详情</h3>
        <button onclick="closeDetail()" class="text-gray-400 hover:text-gray-600 transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>
      <div class="flex border-b border-gray-100 px-5 flex-shrink-0">
        <button onclick="switchTab('info')" id="tab-info"
          class="py-3 px-4 text-sm font-medium text-primary border-b-2 border-primary">基本信息</button>
        <button onclick="switchTab('checkins')" id="tab-checkins"
          class="py-3 px-4 text-sm font-medium text-gray-500 hover:text-primary border-b-2 border-transparent">打卡记录</button>
        <button onclick="switchTab('reviews')" id="tab-reviews"
          class="py-3 px-4 text-sm font-medium text-gray-500 hover:text-primary border-b-2 border-transparent">复核记录</button>
      </div>
      <div id="detail-body" class="p-5 overflow-y-auto flex-1"></div>
    </div>
  </div>

  <!-- ═══ 复核提交弹窗 ═══ -->
  <div id="review-modal"
    class="fixed inset-0 bg-black bg-opacity-40 z-[60] items-center justify-center p-4">
    <div class="bg-white rounded-xl shadow-2xl w-full max-w-md">
      <div class="flex items-center justify-between px-5 py-4 border-b border-gray-100">
        <h3 class="font-bold text-gray-800">📝 提交复核</h3>
        <button onclick="closeReviewModal()" class="text-gray-400 hover:text-gray-600">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>
      <div class="p-5 space-y-4">
        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-1">复核类型</label>
          <select id="review-type" class="w-full">
            <option value="方案复核">方案复核</option>
            <option value="阶段评估">阶段评估</option>
            <option value="训练跟踪">训练跟踪</option>
          </select>
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-1">教员姓名</label>
          <input type="text" id="reviewer-name" placeholder="您的姓名" class="w-full">
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-1">复核意见 <span class="text-danger">*</span></label>
          <textarea id="review-content" rows="3" placeholder="对该学员的评估、方案或训练情况进行复核..." class="w-full resize-none"></textarea>
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-1">调整建议</label>
          <textarea id="review-suggestion" rows="2" placeholder="如需调整方案或训练内容，请在此说明..." class="w-full resize-none"></textarea>
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-1">状态</label>
          <select id="review-status" class="w-full">
            <option value="待处理">待处理</option>
            <option value="已确认">已确认</option>
            <option value="需调整">需调整</option>
          </select>
        </div>
        <div class="flex gap-3">
          <button onclick="submitReview()"
            class="flex-1 bg-primary hover:bg-blue-800 text-white py-2.5 rounded-lg text-sm font-medium transition-colors">
            提交复核
          </button>
          <button onclick="closeReviewModal()"
            class="flex-1 border border-gray-200 text-gray-600 hover:bg-gray-50 py-2.5 rounded-lg text-sm font-medium transition-colors">
            取消
          </button>
        </div>
        <p id="review-msg" class="text-center text-sm hidden"></p>
      </div>
    </div>
  </div>

  <script>
    let currentPage = 1;
    let totalPages = 1;
    let debounceTimer = null;
    let currentDetailPatientId = null;
    let currentDetailData = null;
    let currentTab = 'info';

    const stageColors = {
      '急性期':   'bg-red-100 text-red-700',
      '亚急性期': 'bg-orange-100 text-orange-700',
      '恢复期':   'bg-yellow-100 text-yellow-700',
      '强化期':   'bg-green-100 text-green-700',
      '未知':     'bg-gray-100 text-gray-500',
    };
    const riskColors = {
      '高风险': 'bg-red-100 text-red-700',
      '中风险': 'bg-yellow-100 text-yellow-700',
      '低风险': 'bg-green-100 text-green-700',
    };
    const reviewStatusColors = {
      '待处理': 'bg-yellow-100 text-yellow-700',
      '已确认': 'bg-green-100 text-green-700',
      '需调整': 'bg-red-100 text-red-700',
    };

    // ─── 统计 ─────────────────────────────────────────────────────────────────
    async function loadStats() {
      try {
        const data = await api('/admin/api/stats');
        document.getElementById('stat-total').textContent    = data.total_patients ?? 0;
        document.getElementById('stat-risk').textContent     = data.high_risk_count ?? 0;
        document.getElementById('stat-checkins').textContent = data.today_checkins ?? 0;
        document.getElementById('stat-reviews').textContent  = data.pending_reviews ?? 0;
        const stageDist = data.stage_distribution || {};
        document.getElementById('stat-stages').innerHTML = Object.entries(stageDist).map(([s, c]) =>
          `<span class="stage-badge ${stageColors[s] || 'bg-gray-100 text-gray-500'}">${s} ${c}</span>`
        ).join('');
      } catch (e) { console.error('加载统计失败', e); }
    }

    // ─── 学员列表 ─────────────────────────────────────────────────────────────
    async function loadStudents(page = 1) {
      currentPage = page;
      const search = document.getElementById('search-input').value.trim();
      const stage  = document.getElementById('stage-filter').value;
      const tbody  = document.getElementById('student-tbody');
      tbody.innerHTML = '<tr><td colspan="9" class="text-center text-gray-400 py-8">加载中...</td></tr>';

      const params = new URLSearchParams({ page, search, stage });
      try {
        const data = await api('/admin/api/patients?' + params);
        totalPages = data.pages || 1;
        document.getElementById('page-info').textContent = `共 ${data.total} 条`;
        document.getElementById('page-num').textContent = `第 ${currentPage} / ${totalPages} 页`;
        document.getElementById('btn-prev').disabled = currentPage <= 1;
        document.getElementById('btn-next').disabled = currentPage >= totalPages;

        if (!data.items || data.items.length === 0) {
          tbody.innerHTML = '<tr><td colspan="9" class="text-center text-gray-400 py-8">暂无学员数据</td></tr>';
          return;
        }

        tbody.innerHTML = data.items.map(p => {
          const stageCls = stageColors[p.recovery_stage] || 'bg-gray-100 text-gray-500';
          const painColor = !p.pain_level ? '' : p.pain_level <= 3 ? 'text-success' : p.pain_level <= 6 ? 'text-warning' : 'text-danger font-bold';
          return `
            <tr>
              <td class="font-medium text-gray-800">${esc(p.name)}</td>
              <td class="text-gray-500">${esc(p.gender || '—')} / ${p.age ? p.age + '岁' : '—'}</td>
              <td><span class="stage-badge ${stageCls}">${esc(p.recovery_stage || '未知')}</span></td>
              <td class="${painColor}">${p.pain_level ? p.pain_level + '/10' : '—'}</td>
              <td class="max-w-xs truncate text-gray-500">${esc(p.injury_description || '—')}</td>
              <td class="text-gray-500">${esc(p.unit || '—')}</td>
              <td id="checkin-${p.id}"><span class="text-gray-300 text-xs">加载中</span></td>
              <td id="risk-${p.id}"><span class="text-gray-300 text-xs">加载中</span></td>
              <td class="whitespace-nowrap">
                <button onclick="showDetail(${p.id})"
                  class="text-xs text-primary hover:underline font-medium mr-2">详情</button>
                <button onclick="openReviewModal(${p.id})"
                  class="text-xs text-warning hover:underline font-medium">复核</button>
              </td>
            </tr>`;
        }).join('');

        data.items.forEach(p => loadPatientMeta(p.id));
      } catch (e) {
        tbody.innerHTML = '<tr><td colspan="9" class="text-center text-danger py-8">加载失败：' + esc(e.message) + '</td></tr>';
      }
    }

    async function loadPatientMeta(patientId) {
      try {
        const p = await api('/admin/api/patients/' + patientId);

        // 打卡情况
        const elCheckin = document.getElementById('checkin-' + patientId);
        if (elCheckin) {
          const checkins = p.checkins || [];
          if (checkins.length === 0) {
            elCheckin.innerHTML = '<span class="text-gray-300 text-xs">未打卡</span>';
          } else {
            const c = checkins[0];
            const rateColor = c.completion_rate >= 80 ? 'text-success' : c.completion_rate >= 50 ? 'text-warning' : 'text-danger';
            elCheckin.innerHTML = `<span class="text-xs ${rateColor} font-semibold">${c.completion_rate}%</span> <span class="text-xs text-gray-400">${esc(c.checkin_date || '')}</span>`;
          }
        }

        // 风险情况
        const elRisk = document.getElementById('risk-' + patientId);
        if (elRisk) {
          const feedbacks = p.feedback_logs || [];
          if (feedbacks.length === 0) {
            elRisk.innerHTML = '<span class="text-gray-300 text-xs">无记录</span>';
          } else {
            const cls = riskColors[feedbacks[0].risk_level] || 'bg-gray-100 text-gray-500';
            elRisk.innerHTML = `<span class="stage-badge ${cls}">${esc(feedbacks[0].risk_level || '—')}</span>`;
          }
        }
      } catch (e) {
        const el = document.getElementById('risk-' + patientId);
        if (el) el.innerHTML = '<span class="text-gray-300 text-xs">—</span>';
      }
    }

    function changePage(delta) {
      const newPage = currentPage + delta;
      if (newPage < 1 || newPage > totalPages) return;
      loadStudents(newPage);
    }

    function debounceLoad() {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => loadStudents(1), 300);
    }

    // ─── 详情弹窗 ─────────────────────────────────────────────────────────────
    async function showDetail(patientId) {
      currentDetailPatientId = patientId;
      currentTab = 'info';
      document.getElementById('detail-modal').classList.add('open');
      document.getElementById('detail-body').innerHTML = '<p class="text-gray-400 text-center py-8">加载中...</p>';
      updateTabStyles();

      try {
        const p = await api('/admin/api/patients/' + patientId);
        currentDetailData = p;
        document.getElementById('detail-title').textContent = `学员详情 — ${p.name}`;
        renderInfoTab(p);
      } catch (e) {
        document.getElementById('detail-body').innerHTML = '<p class="text-danger text-center py-4">加载失败：' + esc(e.message) + '</p>';
      }
    }

    function switchTab(tab) {
      currentTab = tab;
      updateTabStyles();
      if (!currentDetailData) return;
      if (tab === 'info') renderInfoTab(currentDetailData);
      else if (tab === 'checkins') renderCheckinsTab(currentDetailData);
      else if (tab === 'reviews') renderReviewsTab(currentDetailData);
    }

    function updateTabStyles() {
      ['info', 'checkins', 'reviews'].forEach(t => {
        const btn = document.getElementById('tab-' + t);
        if (!btn) return;
        btn.className = t === currentTab
          ? 'py-3 px-4 text-sm font-medium text-primary border-b-2 border-primary'
          : 'py-3 px-4 text-sm font-medium text-gray-500 hover:text-primary border-b-2 border-transparent';
      });
    }

    function renderInfoTab(p) {
      const stageCls = stageColors[p.recovery_stage] || 'bg-gray-100 text-gray-500';
      const latestFeedback = (p.feedback_logs || [])[0];
      const latestPlan = (p.rehab_plans || [])[0];

      let planHtml = '<p class="text-gray-400 text-xs">暂无方案</p>';
      if (latestPlan) {
        try {
          const plan = JSON.parse(latestPlan.plan_json || '{}');
          const statusCls = reviewStatusColors[latestPlan.status] || 'bg-yellow-100 text-yellow-700';
          planHtml = `
            <div class="bg-blue-50 rounded-lg p-3 text-xs">
              <div class="flex gap-2 mb-2 flex-wrap">
                <span class="stage-badge ${stageCls}">${esc(plan.stage || '')}</span>
                <span class="stage-badge bg-yellow-100 text-yellow-700">${esc(plan.severity || '')}</span>
                <span class="stage-badge ${statusCls}">${esc(latestPlan.status || '待复核')}</span>
              </div>
              <p class="text-gray-700"><strong>目标：</strong>${esc(plan['目标'] || '—')}</p>
              <p class="text-gray-700 mt-1"><strong>预期时间：</strong>${esc(plan['预期时间'] || '—')}</p>
            </div>`;
        } catch (e) { planHtml = '<p class="text-gray-400 text-xs">方案数据异常</p>'; }
      }

      document.getElementById('detail-body').innerHTML = `
        <div class="space-y-4 text-sm">
          <div class="flex items-center gap-3">
            <div class="w-12 h-12 bg-primary rounded-full flex items-center justify-center text-white text-lg font-bold flex-shrink-0">
              ${esc((p.name || '?').charAt(0))}
            </div>
            <div>
              <p class="font-bold text-gray-800 text-base">${esc(p.name)}</p>
              <span class="stage-badge ${stageCls} mt-1">${esc(p.recovery_stage || '未知')}</span>
            </div>
          </div>

          <div class="grid grid-cols-3 gap-2 text-xs">
            <div class="bg-gray-50 rounded-lg p-2"><span class="text-gray-400">性别</span> <span class="font-medium ml-1">${esc(p.gender || '—')}</span></div>
            <div class="bg-gray-50 rounded-lg p-2"><span class="text-gray-400">年龄</span> <span class="font-medium ml-1">${p.age ? p.age + '岁' : '—'}</span></div>
            <div class="bg-gray-50 rounded-lg p-2"><span class="text-gray-400">单位</span> <span class="font-medium ml-1">${esc(p.unit || '—')}</span></div>
          </div>

          ${(p.medical_history || p.surgery_history) ? `
          <div class="grid grid-cols-2 gap-2 text-xs">
            ${p.medical_history ? `<div class="bg-gray-50 rounded-lg p-2"><span class="text-gray-400 block mb-0.5">既往伤病史</span><p class="font-medium">${esc(p.medical_history)}</p></div>` : ''}
            ${p.surgery_history ? `<div class="bg-gray-50 rounded-lg p-2"><span class="text-gray-400 block mb-0.5">手术史</span><p class="font-medium">${esc(p.surgery_history)}</p></div>` : ''}
          </div>` : ''}

          <div>
            <p class="text-xs font-semibold text-gray-600 mb-1">伤情描述</p>
            <p class="text-xs text-gray-700 bg-gray-50 rounded-lg p-2 leading-relaxed">${esc(p.injury_description || '暂无')}</p>
          </div>

          ${p.pain_level ? `
          <div>
            <p class="text-xs font-semibold text-gray-600 mb-1">疼痛评分</p>
            <div class="flex items-center gap-2">
              <div class="flex-1 bg-gray-200 rounded-full h-2">
                <div class="h-2 rounded-full ${p.pain_level <= 3 ? 'bg-success' : p.pain_level <= 6 ? 'bg-warning' : 'bg-danger'}"
                  style="width:${p.pain_level * 10}%"></div>
              </div>
              <span class="text-xs font-bold ${p.pain_level <= 3 ? 'text-success' : p.pain_level <= 6 ? 'text-warning' : 'text-danger'}">${p.pain_level}/10</span>
            </div>
          </div>` : ''}

          <div>
            <p class="text-xs font-semibold text-gray-600 mb-1">最新康复方案</p>
            ${planHtml}
          </div>

          ${latestFeedback ? `
          <div>
            <p class="text-xs font-semibold text-gray-600 mb-1">最近训练反馈</p>
            <div class="bg-gray-50 rounded-lg p-2 text-xs">
              <span class="stage-badge ${riskColors[latestFeedback.risk_level] || 'bg-gray-100 text-gray-500'}">${esc(latestFeedback.risk_level || '—')}</span>
              <p class="text-gray-700 mt-1">${esc(latestFeedback.content || '—')}</p>
            </div>
          </div>` : ''}

          ${p.ai_profile ? `
          <div>
            <p class="text-xs font-semibold text-gray-600 mb-1">AI 康复画像</p>
            <p class="text-xs text-gray-700 bg-blue-50 rounded-lg p-2 leading-relaxed">${esc(p.ai_profile)}</p>
          </div>` : ''}

          <button onclick="openReviewModal(${p.id})"
            class="w-full bg-warning hover:bg-yellow-600 text-white py-2.5 rounded-lg text-sm font-medium transition-colors">
            📝 提交复核
          </button>
        </div>`;
    }

    function renderCheckinsTab(p) {
      const checkins = p.checkins || [];
      if (checkins.length === 0) {
        document.getElementById('detail-body').innerHTML = '<p class="text-gray-400 text-center py-8">该学员暂无打卡记录</p>';
        return;
      }
      document.getElementById('detail-body').innerHTML = `
        <div class="space-y-3">
          ${checkins.map(c => {
            const rateColor = c.completion_rate >= 80 ? 'text-success' : c.completion_rate >= 50 ? 'text-warning' : 'text-danger';
            const rateBar = c.completion_rate >= 80 ? 'bg-success' : c.completion_rate >= 50 ? 'bg-warning' : 'bg-danger';
            const feelingIcon = c.overall_feeling === '好' ? '😊' : c.overall_feeling === '差' ? '😣' : '😐';
            return `
              <div class="border border-gray-100 rounded-xl p-3">
                <div class="flex items-center justify-between mb-2">
                  <span class="text-xs font-semibold text-gray-500">${esc(c.checkin_date || (c.created_at || '').slice(0,10))}</span>
                  <span class="text-sm">${feelingIcon} <span class="text-xs text-gray-600">${esc(c.overall_feeling || '—')}</span></span>
                </div>
                <div class="flex items-center gap-3 mb-1.5">
                  <div class="flex-1">
                    <div class="flex justify-between text-xs text-gray-500 mb-1">
                      <span>完成率</span><span class="${rateColor} font-bold">${c.completion_rate}%</span>
                    </div>
                    <div class="w-full bg-gray-100 rounded-full h-1.5">
                      <div class="${rateBar} h-1.5 rounded-full" style="width:${c.completion_rate}%"></div>
                    </div>
                  </div>
                  <div class="text-center flex-shrink-0">
                    <p class="text-sm font-bold ${(c.pain_level||0) <= 3 ? 'text-success' : (c.pain_level||0) <= 6 ? 'text-warning' : 'text-danger'}">${c.pain_level ?? '—'}</p>
                    <p class="text-xs text-gray-400">疼痛</p>
                  </div>
                </div>
                ${c.symptoms ? `<p class="text-xs text-gray-500">症状：${esc(c.symptoms)}</p>` : ''}
                ${c.notes ? `<p class="text-xs text-gray-400 mt-0.5">备注：${esc(c.notes)}</p>` : ''}
              </div>`;
          }).join('')}
        </div>`;
    }

    async function renderReviewsTab(p) {
      document.getElementById('detail-body').innerHTML = '<p class="text-gray-400 text-center py-4">加载中...</p>';
      try {
        const reviews = await api('/teacher/api/reviews/' + p.id);
        if (reviews.length === 0) {
          document.getElementById('detail-body').innerHTML = `
            <div class="text-center py-8">
              <p class="text-gray-400 mb-3">暂无复核记录</p>
              <button onclick="openReviewModal(${p.id})"
                class="bg-warning hover:bg-yellow-600 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors">
                📝 提交第一条复核
              </button>
            </div>`;
          return;
        }
        document.getElementById('detail-body').innerHTML = `
          <div class="space-y-3 mb-4">
            ${reviews.map(r => {
              const statusCls = reviewStatusColors[r.status] || 'bg-gray-100 text-gray-500';
              return `
                <div class="border border-gray-100 rounded-xl p-3">
                  <div class="flex items-center justify-between mb-2">
                    <div class="flex items-center gap-2">
                      <span class="text-xs font-semibold text-gray-700">${esc(r.reviewer_name || '教员')}</span>
                      <span class="text-xs text-gray-400">· ${esc(r.review_type)}</span>
                    </div>
                    <span class="stage-badge ${statusCls}">${esc(r.status)}</span>
                  </div>
                  <p class="text-xs text-gray-700 leading-relaxed">${esc(r.content)}</p>
                  ${r.suggestion ? `<p class="text-xs text-primary mt-1.5 font-medium">建议：${esc(r.suggestion)}</p>` : ''}
                  <p class="text-xs text-gray-300 mt-1.5">${esc((r.created_at || '').slice(0,16))}</p>
                </div>`;
            }).join('')}
          </div>
          <button onclick="openReviewModal(${p.id})"
            class="w-full bg-warning hover:bg-yellow-600 text-white py-2.5 rounded-lg text-sm font-medium transition-colors">
            📝 新增复核
          </button>`;
      } catch (e) {
        document.getElementById('detail-body').innerHTML = '<p class="text-danger text-center py-4">加载失败</p>';
      }
    }

    function closeDetail() {
      document.getElementById('detail-modal').classList.remove('open');
      currentDetailPatientId = null;
      currentDetailData = null;
    }

    // ─── 复核弹窗 ─────────────────────────────────────────────────────────────
    function openReviewModal(patientId) {
      currentDetailPatientId = patientId;
      document.getElementById('review-modal').classList.add('open');
      document.getElementById('review-content').value = '';
      document.getElementById('review-suggestion').value = '';
      document.getElementById('review-msg').classList.add('hidden');
    }

    function closeReviewModal() {
      document.getElementById('review-modal').classList.remove('open');
    }

    async function submitReview() {
      const content = document.getElementById('review-content').value.trim();
      if (!content) { showReviewMsg('复核内容不能为空', 'error'); return; }

      const payload = {
        patient_id: currentDetailPatientId,
        review_type: document.getElementById('review-type').value,
        reviewer_name: document.getElementById('reviewer-name').value.trim(),
        content,
        suggestion: document.getElementById('review-suggestion').value.trim(),
        status: document.getElementById('review-status').value,
      };

      try {
        const resp = await fetch('/teacher/api/reviews', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const data = await resp.json();
        if (!resp.ok) {
          showReviewMsg(data.error || '提交失败', 'error');
        } else {
          showReviewMsg('✅ 复核已提交', 'success');
          loadStats();
          setTimeout(() => {
            closeReviewModal();
            if (currentDetailData && currentDetailData.id === currentDetailPatientId) {
              currentTab = 'reviews';
              updateTabStyles();
              renderReviewsTab(currentDetailData);
            }
          }, 1000);
        }
      } catch (e) {
        showReviewMsg('网络错误：' + e.message, 'error');
      }
    }

    function showReviewMsg(text, type) {
      const el = document.getElementById('review-msg');
      el.textContent = text;
      el.className = `text-center text-sm ${type === 'success' ? 'text-success' : 'text-danger'}`;
      el.classList.remove('hidden');
    }

    // ─── 工具函数 ─────────────────────────────────────────────────────────────
    async function api(url) {
      const resp = await fetch(url);
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      return resp.json();
    }

    function esc(str) {
      return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    loadStats();
    loadStudents(1);
  </script>
</body>
</html>
